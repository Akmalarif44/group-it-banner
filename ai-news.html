<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group IT — AI news</title>
<style>
  :root{
    --paper:#ffffff;
    --ink:#241a1c;
    --ink-soft:#8a7477;
    --red:#7a1220;
    --red-bright:#9e1b2e;
    --line:#e3d7d9;
    --panel:#fbf5f6;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  .panel{
    height:100%;
    padding:16px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow:hidden;
  }
  .head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }
  .label{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:ui-monospace,"SF Mono","Cascadia Mono",Consolas,monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--ink);
    margin:0;
  }
  .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:#2fae5c;
    box-shadow:0 0 0 3px rgba(47,174,92,0.18);
    flex-shrink:0;
  }
  .refresh{
    border:0;
    background:none;
    cursor:pointer;
    color:var(--ink-soft);
    padding:4px;
    border-radius:6px;
    display:grid;
    place-items:center;
    transition:background .15s, color .15s;
  }
  .refresh:hover{ background:var(--panel); color:var(--red); }
  .refresh svg{ width:14px; height:14px; }
  .refresh.spin svg{ animation:spin .7s linear; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .list{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-right:2px;
  }
  a.item{
    display:block;
    padding:9px 11px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--line);
    text-decoration:none;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  a.item:hover{
    border-color:var(--red);
    background:#fdeef0;
  }
  .item-title{
    font-size:12px;
    font-weight:600;
    line-height:1.35;
    margin:0 0 4px;
  }
  .item-meta{
    font-size:10px;
    color:var(--red);
    font-weight:600;
    display:flex;
    gap:6px;
    align-items:center;
  }
  .item-meta .src{ opacity:0.85; }

  .status{
    font-size:11.5px;
    color:var(--ink-soft);
    padding:10px 2px;
    text-align:center;
  }

  .skeleton{
    border-radius:8px;
    background:linear-gradient(100deg, var(--panel) 30%, #f2e4e6 50%, var(--panel) 70%);
    background-size:220% 100%;
    animation:shimmer 1.3s ease-in-out infinite;
    height:52px;
  }
  @keyframes shimmer{
    0%{ background-position:120% 0; }
    100%{ background-position:-20% 0; }
  }
  @media (prefers-reduced-motion:reduce){
    .skeleton{ animation:none; }
    .refresh.spin svg{ animation:none; }
  }
</style>
</head>
<body>

<div class="panel">
  <div class="head">
    <p class="label"><span class="dot"></span>AI News — Live Feed</p>
    <button class="refresh" id="refreshBtn" title="Refresh now" aria-label="Refresh now">
      <svg viewBox="0 0 24 24" fill="none"><path d="M20 12a8 8 0 1 1-2.6-5.9M20 4v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="list" id="list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
(function(){
  var FEED = 'https://api.rss2json.com/v1/api.json?rss_url=' +
    encodeURIComponent('https://news.google.com/rss/search?q=artificial+intelligence&hl=en-US&gl=US&ceid=US:en');
  var list = document.getElementById('list');
  var refreshBtn = document.getElementById('refreshBtn');
  var timer = null;

  function timeAgo(dateStr){
    var diff = Date.now() - new Date(dateStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function render(items){
    list.innerHTML = '';
    items.slice(0, 8).forEach(function(item){
      var a = document.createElement('a');
      a.className = 'item';
      a.href = item.link;
      a.target = '_blank';
      a.rel = 'noopener';
      var title = document.createElement('p');
      title.className = 'item-title';
      title.textContent = item.title;
      var meta = document.createElement('div');
      meta.className = 'item-meta';
      var src = document.createElement('span');
      src.className = 'src';
      src.textContent = (item.author || 'Google News') + ' · ' + timeAgo(item.pubDate);
      meta.appendChild(src);
      a.appendChild(title);
      a.appendChild(meta);
      list.appendChild(a);
    });
  }

  function showStatus(msg){
    list.innerHTML = '<div class="status">' + msg + '</div>';
  }

  function load(){
    refreshBtn.classList.add('spin');
    fetch(FEED)
      .then(function(res){
        if (!res.ok) throw new Error('bad response');
        return res.json();
      })
      .then(function(data){
        if (!data.items || !data.items.length) throw new Error('empty');
        render(data.items);
      })
      .catch(function(){
        showStatus('Couldn’t load the latest AI news right now — try the refresh button, or check back later.');
      })
      .finally(function(){
        setTimeout(function(){ refreshBtn.classList.remove('spin'); }, 500);
      });
  }

  refreshBtn.addEventListener('click', load);
  load();
  timer = setInterval(load, 20 * 60 * 1000);
})();
</script>
</body>
</html>
