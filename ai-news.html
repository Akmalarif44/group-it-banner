<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group IT — AI news</title>
<style>
  :root{
    --paper:#ffffff;
    --ink:#241a1c;
    --ink-soft:#8a7477;
    --red:#7a1220;
    --red-bright:#9e1b2e;
    --line:#e3d7d9;
    --panel:#fbf5f6;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  .panel{
    height:100%;
    padding:16px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow:hidden;
  }
  .head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }
  .label{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:ui-monospace,"SF Mono","Cascadia Mono",Consolas,monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--ink);
    margin:0;
  }
  .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:#2fae5c;
    box-shadow:0 0 0 3px rgba(47,174,92,0.18);
    flex-shrink:0;
  }
  .refresh{
    border:0;
    background:none;
    cursor:pointer;
    color:var(--ink-soft);
    padding:4px;
    border-radius:6px;
    display:grid;
    place-items:center;
    transition:background .15s, color .15s;
  }
  .refresh:hover{ background:var(--panel); color:var(--red); }
  .refresh svg{ width:14px; height:14px; }
  .refresh.spin svg{ animation:spin .7s linear; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .list{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-right:2px;
  }
  a.item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 11px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--line);
    text-decoration:none;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  a.item:hover{
    border-color:var(--red);
    background:#fdeef0;
  }
  .thumb{
    flex-shrink:0;
    width:52px; height:52px;
    border-radius:7px;
    background:var(--red) center/cover no-repeat;
    display:grid;
    place-items:center;
  }
  .thumb svg{ width:18px; height:18px; opacity:0.9; }
  .item-body{ min-width:0; flex:1; }
  .item-title{
    font-size:12px;
    font-weight:600;
    line-height:1.35;
    margin:0 0 4px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .item-meta{
    font-size:10px;
    color:var(--red);
    font-weight:600;
    display:flex;
    gap:6px;
    align-items:center;
  }
  .item-meta .src{ opacity:0.85; }

  a.feature{
    display:block;
    position:relative;
    flex-shrink:0;
    height:132px;
    border-radius:10px;
    overflow:hidden;
    text-decoration:none;
    background:var(--red);
  }
  a.feature .feature-img{
    position:absolute; inset:0;
    background:center/cover no-repeat;
    transform:scale(1);
    transition:transform .35s ease;
  }
  a.feature:hover .feature-img{ transform:scale(1.06); }
  a.feature::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(20,10,12,0.88) 0%, rgba(20,10,12,0.35) 45%, transparent 75%);
  }
  .feature-tag{
    position:absolute;
    top:10px; left:10px;
    background:var(--red);
    color:#fff;
    font-family:ui-monospace,"SF Mono","Cascadia Mono",Consolas,monospace;
    font-size:9.5px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:5px;
  }
  .feature-body{
    position:absolute; left:0; right:0; bottom:0;
    padding:10px 12px;
    color:#fff;
  }
  .feature-title{
    font-size:14px;
    font-weight:700;
    line-height:1.3;
    margin:0 0 4px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .feature-meta{
    font-size:10.5px;
    color:rgba(255,255,255,0.85);
    font-weight:600;
  }

  .sub-label{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:2px 0 0;
  }

  a.item{
    opacity:0;
    animation:tile-in .4s ease forwards;
    animation-delay:calc(var(--i, 0) * 60ms + 60ms);
  }
  @keyframes tile-in{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @media (prefers-reduced-motion:reduce){
    a.item{ opacity:1; animation:none; }
    a.feature .feature-img{ transition:none; }
  }

  .status{
    font-size:11.5px;
    color:var(--ink-soft);
    padding:10px 2px;
    text-align:center;
  }

  .skeleton{
    border-radius:8px;
    background:linear-gradient(100deg, var(--panel) 30%, #f2e4e6 50%, var(--panel) 70%);
    background-size:220% 100%;
    animation:shimmer 1.3s ease-in-out infinite;
    height:52px;
  }
  @keyframes shimmer{
    0%{ background-position:120% 0; }
    100%{ background-position:-20% 0; }
  }
  @media (prefers-reduced-motion:reduce){
    .skeleton{ animation:none; }
    .refresh.spin svg{ animation:none; }
  }
</style>
</head>
<body>

<div class="panel">
  <div class="head">
    <p class="label"><span class="dot"></span>AI News — Live Feed</p>
    <button class="refresh" id="refreshBtn" title="Refresh now" aria-label="Refresh now">
      <svg viewBox="0 0 24 24" fill="none"><path d="M20 12a8 8 0 1 1-2.6-5.9M20 4v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="list" id="list">
    <div class="skeleton" style="height:132px"></div>
    <div class="skeleton" style="height:52px"></div>
    <div class="skeleton" style="height:52px"></div>
    <div class="skeleton" style="height:52px"></div>
  </div>
</div>

<script>
(function(){
  var FEED = 'https://api.rss2json.com/v1/api.json?rss_url=' +
    encodeURIComponent('https://www.theverge.com/rss/ai-artificial-intelligence/index.xml');
  var list = document.getElementById('list');
  var refreshBtn = document.getElementById('refreshBtn');
  var timer = null;

  function timeAgo(dateStr){
    var diff = Date.now() - new Date(dateStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function extractImage(item){
    var html = item.content || item.description || '';
    var match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
    return match ? match[1] : '';
  }

  function imageFor(item){
    return item.thumbnail || (item.enclosure && item.enclosure.link) || extractImage(item) || '';
  }

  function buildFeature(item){
    var a = document.createElement('a');
    a.className = 'feature';
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener';

    var imgEl = document.createElement('div');
    imgEl.className = 'feature-img';
    var img = imageFor(item);
    if (img) imgEl.style.backgroundImage = 'url(' + img + ')';
    a.appendChild(imgEl);

    if (item.categories && item.categories[0]){
      var tag = document.createElement('span');
      tag.className = 'feature-tag';
      tag.textContent = item.categories[0];
      a.appendChild(tag);
    }

    var body = document.createElement('div');
    body.className = 'feature-body';
    var title = document.createElement('p');
    title.className = 'feature-title';
    title.textContent = item.title;
    var meta = document.createElement('div');
    meta.className = 'feature-meta';
    meta.textContent = (item.author || 'The Verge') + ' · ' + timeAgo(item.pubDate);
    body.appendChild(title);
    body.appendChild(meta);
    a.appendChild(body);
    return a;
  }

  function buildItem(item, index){
    var a = document.createElement('a');
    a.className = 'item';
    a.style.setProperty('--i', index);
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener';
    var thumb = document.createElement('div');
    thumb.className = 'thumb';
    var img = imageFor(item);
    if (img){
      thumb.style.backgroundImage = 'url(' + img + ')';
    } else {
      thumb.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z" stroke="#fff" stroke-width="1.6"/><circle cx="9" cy="10" r="1.4" fill="#fff"/><path d="M4 16l5-4 4 3 3-2 4 3" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/></svg>';
    }

    var body = document.createElement('div');
    body.className = 'item-body';
    var title = document.createElement('p');
    title.className = 'item-title';
    title.textContent = item.title;
    var meta = document.createElement('div');
    meta.className = 'item-meta';
    var src = document.createElement('span');
    src.className = 'src';
    src.textContent = (item.author || 'The Verge') + ' · ' + timeAgo(item.pubDate);
    meta.appendChild(src);
    body.appendChild(title);
    body.appendChild(meta);

    a.appendChild(thumb);
    a.appendChild(body);
    return a;
  }

  function render(items){
    list.innerHTML = '';
    if (!items.length) return;
    list.appendChild(buildFeature(items[0]));
    var sub = document.createElement('p');
    sub.className = 'sub-label';
    sub.textContent = 'More AI news';
    list.appendChild(sub);
    items.slice(1, 8).forEach(function(item, i){
      list.appendChild(buildItem(item, i));
    });
  }

  function showStatus(msg){
    list.innerHTML = '<div class="status">' + msg + '</div>';
  }

  function load(){
    refreshBtn.classList.add('spin');
    fetch(FEED)
      .then(function(res){
        if (!res.ok) throw new Error('bad response');
        return res.json();
      })
      .then(function(data){
        if (!data.items || !data.items.length) throw new Error('empty');
        render(data.items);
      })
      .catch(function(){
        showStatus('Couldn’t load the latest AI news right now — try the refresh button, or check back later.');
      })
      .finally(function(){
        setTimeout(function(){ refreshBtn.classList.remove('spin'); }, 500);
      });
  }

  refreshBtn.addEventListener('click', load);
  load();
  timer = setInterval(load, 20 * 60 * 1000);
})();
</script>
</body>
</html>
